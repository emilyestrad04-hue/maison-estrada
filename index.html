<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Estrada | Fine Dining</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:#0b0b0b;color:#fff}

nav{position:fixed;top:0;width:100%;background:#000;padding:15px;display:flex;justify-content:center;gap:25px;z-index:1000}
nav a{color:#d4af37;text-decoration:none}

header{height:100vh;background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0');background-size:cover;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.logo{font-family:'Playfair Display';font-size:5rem;color:#d4af37}
.sub{color:#ccc;margin:10px}
.btn{padding:10px 20px;margin:5px;border:1px solid #d4af37;background:none;color:#d4af37;cursor:pointer}
.btn:hover{background:#d4af37;color:#000}

section{padding:90px 10%}
h2{color:#d4af37;margin-bottom:20px}

.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#111;border-radius:10px;overflow:hidden}
.card img{width:100%;height:200px;object-fit:cover}
.card-content{padding:15px}
.price{color:#d4af37}

#carrito{background:#111;padding:15px;margin-top:20px;border-radius:10px}

.galeria{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.galeria img{width:100%;height:200px;object-fit:cover}

form input{width:100%;padding:10px;margin:10px 0;background:#111;border:none;color:#fff}
form button{width:100%;padding:10px;background:#d4af37;border:none;cursor:pointer}

footer{text-align:center;padding:20px;background:#000;color:#777}
</style></head><body><nav>
<a href="#">Inicio</a>
<a href="#menu">Menú</a>
<a href="#galeria">Galería</a>
<a href="#reserva">Reservas</a>
</nav><header>
<div class="logo">ME</div>
<h1>Maison Estrada</h1>
<p class="sub">Lujo · Elegancia · Experiencia</p>
<button class="btn" onclick="scrollTo('menu')">Menú</button>
<button class="btn" onclick="scrollTo('reserva')">Reservar</button>
</header><section id="menu">
<h2>Menú</h2>
<div class="menu"><div class="card"><img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092"><div class="card-content"><h3>Wagyu</h3><p class="price">$45</p><button onclick="add('Wagyu',45)">Agregar</button></div></div>
<div class="card"><img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe"><div class="card-content"><h3>Pasta</h3><p class="price">$30</p><button onclick="add('Pasta',30)">Agregar</button></div></div>
<div class="card"><img src="https://images.unsplash.com/photo-1559847844-5315695dadae"><div class="card-content"><h3>Salmón</h3><p class="price">$28</p><button onclick="add('Salmon',28)">Agregar</button></div></div>
<div class="card"><img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061"><div class="card-content"><h3>Postre</h3><p class="price">$15</p><button onclick="add('Postre',15)">Agregar</button></div></div>
<div class="card"><img src="https://images.unsplash.com/photo-1551024506-0bccd828d307"><div class="card-content"><h3>Jugo</h3><p class="price">$7</p><button onclick="add('Jugo',7)">Agregar</button></div></div>
<div class="card"><img src="https://images.unsplash.com/photo-1544145945-f90425340c7e"><div class="card-content"><h3>Vino</h3><p class="price">$20</p><button onclick="add('Vino',20)">Agregar</button></div></div></div><div id="carrito">
<h3>Carrito</h3>
<ul id="lista"></ul>
<p>Total: $<span id="total">0</span></p>
</div>
</section><section id="galeria">
<h2>Galería</h2>
<div class="galeria">
<img src="https://images.unsplash.com/photo-1551218808-94e220e084d2">
<img src="https://images.unsplash.com/photo-1528605248644-14dd04022da1">
<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
</div>
</section><section id="reserva">
<h2>Reservación</h2>
<form onsubmit="reservar(event)">
<input type="text" placeholder="Nombre" required>
<input type="date" required>
<input type="time" required>
<input type="number" placeholder="Personas" required>
<button>Confirmar</button>
</form>
<p id="msg"></p>
</section><footer>
<p>© 2026 Maison Estrada</p>
</footer><script>
let total=0;
function add(n,p){let li=document.createElement('li');li.textContent=n+' - $'+p;document.getElementById('lista').appendChild(li);total+=p;document.getElementById('total').textContent=total}
function reservar(e){e.preventDefault();document.getElementById('msg').textContent='Reservación confirmada'}
function scrollTo(id){document.getElementById(id).scrollIntoView({behavior:'smooth'})}
</script></body>
</html>
